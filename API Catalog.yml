openapi: 3.0.0
x-stoplight:
  id: r917omni50d6a
info:
  title: API Catalog
  version: '1.0'
  description: "## Purpose\r\nThis API provides operations to view and manage the content of the catalog which is compromised of these primary resources, organised as a hierarchy (API > Proxy > Version)\r\n\r\nAPI - Represents a business user's concept of an API which is version-independent\r\n\r\nProxy - Component that runs on the SEAPIM API platform, managing API traffic\r\n\r\nVersion - A document describing how to use a specific API version, for reference by application developers\r\n\r\nThe API is scope-enabled, press Authorize to see the defined scopes. Default scoping provides **read-only** access.\r\n## Context\r\nThis is one of a set of SEAPIM platform APIs, built on a shared API catalog model which is maintained in a design library.\r\nSEAPIM is the Schneider Electric API management platform which hosts and secures access to APIs.\r\n\r\n## Notes\r\n- Only GET operations return a response payload\r\n- GET operations on an empty collection return an empty list []\r\n- Query parameter string values are case-insensitive\r\n- Array query parameters are processed as **AnyOf** unless documented to be AllOf\r\n- Operations on a resource identified by a unique id or key return 404 status if not found\r\n- GET operations on a resource identified by a unique id or key return an **etag**. This must be supplied via an **if-match** header in subsequent patch or delete operations\r\n- GET operations on a collection return the resource and its child resources. Limited to 1 level unless the operation is defined to handle multi-resource transactions.\r\n- GET operations on a collection return an etag but it is not useable for updates or deletes\r\n- GET responses are cached by default and remain fresh for 1 hour\r\n- Update and delete operations return a 412 status if an update conflict is detected\r\n- PUT performs an upsert. The request must include all required fields.\r\n- POST operations return a **location** header to the new resource.\r\n- PATCH operations perform upserts on child resources that are identified as a **leaf child**\r\n- To link an resource to a pre-existing resource, include the child's unique id or key in the request\r\n\r\n## Unique keys\r\nThese fields are keys that uniquely identify a resource if its database id is not known.\r\n- Api.name\r\n- Proxy.proxyName\r\n- Version.name|Version.version\r\n- Stakeholder.email\r\n- Consumer.seapimOrg|Consumer.seapimAppId\r\n- Product.seapimOrg|Product.productName\r\n- Exception.exceptionNumber\r\n- Capability.assetId\r\n\r\n## Role-based Functionality\r\nOperations affecting these stakeholder-related resources require a Ping token.\r\n- Stakeholder\r\n- Rating\r\n- ReadNotification\r\n- ConsumerProduct.apikeys\r\n"
  contact:
    name: Ravi Joshi
    url: 'https://developer.api.se.com'
    email: ravi.joshi@se.com
  termsOfService: 'https://www.se.com/in/en/about-us/legal/terms-of-use.jsp'
