components:
  responses: {}
  securitySchemes:
    apikey:
      name: SEAPIM API Key
      type: apiKey
      in: header
      description: 'Usable together with a ping token only if the calling application has been verified to be a single page app (browser-based). For other app types, an oauth2 token must be passed.'
    x-ping-authorization:
      name: Ping IDP Token
      type: apiKey
      in: header
      description: Required if apikey is provided or if it is documented as required for a specific operation.
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: 'https://api.qa.se.com/token'
          refreshUrl: 'https://api.qa.se.com/token'
          scopes:
            '*:read': 'All resources, read-only access'
            '*:write': 'All resources, create, update read access'
            '*:full': 'All resources, create, update, read and delete access'
            'consumers:full': 'Consumer resources, create, update, read and delete access'
            'products:full': 'Product resources, create, update, read and delete access'
            'certifications:full': 'Certification resources, create, update, read and delete access'
      description: 'SEAPIM OAuth2 token, valid for 1 hour.'
  parameters:
    page:
      name: page
      in: query
      required: false
      schema:
        example: 2
        minimum: 1
        default: 1
      description: Page number of a result set to retrieve. Integer value or "all" to request  all pages.
    size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        example: 15
        default: 1000
      description: Number of items to return for a given page.
    fields:
      name: fields
      in: query
      required: false
      schema:
        type: array
        minItems: 1
        items:
          type: string
      description: 'Include only named fields in the response, but include any required fields implicitly.'
    unique-key:
      name: unique-key
      in: path
      required: true
      schema:
        type: string
      description: A unique string or a number identifier for a specific resource
    version-unique-key:
      name: version-unique-key
      in: path
      required: true
      schema:
        type: string
        example: api-catalog|1.0
      description: A unique string or a number identifier for a specific version. String identifier format is name|version.
    seapim-org:
      name: seapim-org
      in: path
      required: true
      schema:
        type: string
        enum:
          - seapim_non_prod
          - seapim_pre_prod
          - seapim_prod
        example: seapim_prod
      description: A SEAPIM platform organisation name
    if-match:
      name: if-match
      in: header
      schema:
        type: string
        example: W/"2272-8MWxicxxxxxxxx"
      description: etag value matching the last known state of this resource (not expanded). May be set to "none" when passed to a PUT and existing resource was not found.
      required: true
    cache-control:
      name: cache-control
      in: header
      required: false
      schema:
        type: string
        example: no-cache
      description: 'List of standard cache control directives. Supported subset: no-cache, no-store, max-age.'
  schemas: {}
  headers:
    location:
      description: The location where to GET the newly created/replaced record
      schema:
        type: string
        format: uri-reference
        example: /resource/12
    etag:
      description: 'etag, a value associated with the current resource state'
      schema:
        type: string
        example: W/"2272-8MWxicxxxxxxxx"
    date:
      description: Date and time when the response was sent
      schema:
        type: string
        example: 'Wed, 12 Nov 2025 18:06:03 GMT'
    cache-control:
      description: 'List of standard cache control directives. max-age:number of seconds, indicates max time when response is considered fresh. must-revalidate requires caches to request a fresh copy after the max-age period has passed'
      schema:
        type: string
        example: 'max-age:3599, must-revalidate'
    x-page:
      description: Current page number
      schema:
        type: integer
        example: 1
    x-total-pages:
      description: Total number of pages
      schema:
        type: integer
        example: 1
    x-total-items:
      description: Total number of queried items
      schema:
        type: integer
        example: 1000
servers:
  - url: 'https://api.qa.se.com/v1/it/api-catalog'
    description: QA
security:
  - apikey: []
    x-ping-authorization: []
  - x-ping-authorization: []
  - oauth2:
      - '*:read'
      - '*:full'
      - '*:write'
      - 'consumers:full'
      - 'products:full'
      - 'certifications:full'
tags:
  - name: API
  - name: Exception
  - name: Proxy
  - name: Reference
  - name: Stakeholder
  - name: Version
  - name: Notification
  - name: Consumer
  - name: Product
x-default-scope:
